<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Regla de 3</title>
    <style>
        :root { --primary: #28a745; --bg: #f4f7f6; --text: #333; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 350px; }
        h3 { text-align: center; color: var(--text); margin-top: 0; }
        .grid { display: grid; grid-template-columns: 1fr auto 1fr; gap: 15px; align-items: center; margin-bottom: 20px; }
        .arrow { font-size: 1.5rem; color: var(--primary); text-align: center; }
        input { width: 100%; padding: 10px; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 1rem; transition: border-color 0.3s; }
        input:focus { border-color: var(--primary); outline: none; }
        button { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 1rem; font-weight: bold; }
        button:hover { background: #218838; }
        #resultado { margin-top: 20px; padding: 15px; border-radius: 8px; text-align: center; font-weight: bold; background: #f8f9fa; min-height: 1.2em; }
        .error { color: #dc3545; background: #f8d7da !important; }
    </style>
</head>
<body>
    <div class="container">
        <h3>Regla de 3 Simple</h3>
        <div class="grid">
            <input type="number" id="a" placeholder="A">
            <span class="arrow">→</span>
            <input type="number" id="b" placeholder="B">
            <input type="number" id="c" placeholder="C">
            <span class="arrow">→</span>
            <input type="text" value="X" disabled style="background: #eee; text-align: center;">
        </div>
        <button onclick="calcular()">Resolver X</button>
        <div id="resultado">Introduce los valores</div>
    </div>

    <script>
        function calcular() {
            const a = parseFloat(document.getElementById('a').value);
            const b = parseFloat(document.getElementById('b').value);
            const c = parseFloat(document.getElementById('c').value);
            const resDiv = document.getElementById('resultado');

            // 1. Validación de campos vacíos
            if (isNaN(a) || isNaN(b) || isNaN(c)) {
                resDiv.innerHTML = "⚠️ Por favor, completa los campos";
                resDiv.className = "error";
                return;
            }

            // 2. Validación matemática (división por cero)
            if (a === 0) {
                resDiv.innerHTML = "❌ 'A' no puede ser cero";
                resDiv.className = "error";
                return;
            }

            // 3. Cálculo y formato
            const x = (b * c) / a;
const minutosSinProduccion = 540 - x;.
<div id="resultadoResta"></div>s
            resDiv.className = "";
            resDiv.innerHTML = `Resultado: X = ${Number.isInteger(x) ? x : x.toFixed(2)}`;
        }
    </script>
</body>
</html>
